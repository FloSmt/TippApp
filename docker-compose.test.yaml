services:
  # MQTT for mocking MQTT interactions in tests
  mqtt-broker:
    image: eclipse-mosquitto:2.0
    container_name: mqtt_test_broker
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    healthcheck:
      test: [ "CMD-SHELL", "mosquitto_sub -t 'test' -C 1 -E -i healthcheck && exit 0 || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # MockServer for API mocking
  mockserver:
    image: mockserver/mockserver:latest
    container_name: mockserver-external-api
    restart: always
    ports:
      - "1080:1080"
    environment:
      MOCKSERVER_SERVER_PORT: 1080

  # MySQL Test Database
  db-test:
    image: mysql:8.0
    container_name: test-mysql-database
    restart: always
    env_file:
      - environments/.env.test
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
    ports:
      - "3306:3306"
    volumes:
      - test_mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h 127.0.0.1 >/dev/null 2>&1 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  test_mysql_data:
